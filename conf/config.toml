# ==============================
# HTTP服务配置
# ==============================
[server]
# 允许跨域请求的前端地址列表
cors_origins = ["http://localhost:5173", "http://127.0.0.1:5173"]
# 服务监听地址，0.0.0.0 表示所有网卡
host = "0.0.0.0"
# 服务监听端口
port = 8000

# ==============================
# 股票数据配置
# ==============================
[stock]
# 是否启用筹码分布分析
enable_chip_distribution = true
# 是否启用实时行情数据
enable_realtime = true
# 实时行情数据源优先级，按顺序尝试获取
realtime_source_priority = ["tencent", "sina", "eastmoney"]
# 是否检查交易日（非交易日跳过相关任务）
trading_day_check = true
# 关注列表，填入股票代码
watchlist = ["600519", "300750", "002594"]

# ==============================
# LLM 大语言模型配置
# ==============================
[llm]
# API密钥对应的环境变量名，优先从环境变量读取密钥
api_key_env = "DEEPSEEK_API_KEY"
# 模型名称
model = "deepseek-chat"
# 模型提供商：deepseek/openai/anthropic等
provider = "deepseek"
# 生成温度，越高越随机，0~1之间
temperature = 0.7
# 请求超时时间（秒）
timeout_seconds = 60

# ==============================
# MySQL 数据库配置
# ==============================
[database]
# 数据库主机地址
host = "127.0.0.1"
# 数据库名称
name = "dsa"
# 数据库密码（明文，建议使用 password_env 代替）
password = ""
# 数据库密码环境变量名，格式：<端口>_<用户名>，优先于 password 字段
password_env = "mysql.8889_root"
# 数据库端口
port = 3306
# 数据库用户名
user = "root"

# ==============================
# 定时任务配置
# ==============================
[scheduler]
# 是否启用定时任务调度
enabled = false
# 服务启动后是否立即执行一次任务
run_immediately = true
# 任务执行时间列表（24小时制），可配置多个时间点
times = ["18:00"]

# ==============================
# 大盘综述配置
# ==============================
[market_review]
# 是否启用大盘综述功能
enabled = true
# 市场区域：cn=A股, hk=港股, us=美股等
region = "cn"

# ==============================
# 回测配置
# ==============================
[backtest]
# 是否启用回测功能
enabled = true
# 信号评估窗口天数，信号发出后观察该天数内的表现
eval_window_days = 10
# 信号最小年龄天数，过新的信号不参与回测统计
min_age_days = 14
# 中性带百分比，涨跌幅在此范围内视为中性（无方向）
neutral_band_pct = 2.0

# ==============================
# Agent 智能体配置
# ==============================
[agent]
# 架构模式：single=单智能体, multi=多智能体协作
arch = "single"
# 是否启用Agent功能
enabled = false
# 单次任务最大执行步数，防止无限循环
max_steps = 10
# 编排模式：standard=标准, 其他模式可扩展
orchestrator_mode = "standard"
# 技能列表，可加载的Agent能力模块
skills = []

# ==============================
# 通知配置
# ==============================
[notification]
# --- 钉钉机器人 Webhook 地址 ---
dingtalk_webhook = ""
# --- 飞书机器人 Webhook 地址 ---
feishu_webhook = ""
# --- 企业微信机器人 Webhook 地址 ---
wecom_webhook = ""
# --- Telegram 通知配置 ---
telegram_bot_token = ""
telegram_chat_id = ""
# --- Bark 推送地址（iOS推送） ---
bark_url = ""
# --- 邮件 SMTP 通知配置 ---
email_smtp_host = ""
email_smtp_port = 465
email_user = ""
email_pass = ""
# 邮件密码环境变量名，优先于 email_pass
email_pass_env = ""
email_from = ""
email_to = ""

# ==============================
# 搜索配置
# ==============================
[search]
# 默认搜索引擎：serper/bing/google
default_provider = "serper"
# --- Serper 搜索 API ---
serper_api_key = ""
serper_api_key_env = "SERPER_API_KEY"
# --- Bing 搜索 API ---
bing_api_key = ""
bing_api_key_env = "BING_SEARCH_API_KEY"
# --- Google 搜索 API ---
google_api_key = ""
google_api_key_env = "GOOGLE_SEARCH_API_KEY"
# Google 自定义搜索引擎 CX ID
google_cx = ""
